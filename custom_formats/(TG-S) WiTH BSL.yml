name: (TG-S) WiTH BSL
description: '- Region: Used in the United Kingdom (England, Scotland, Wales, and
  Northern Ireland).

  - Alphabet: Primarily a two-handed system.

  - Origins: Developed independently in the UK; part of the BANZSL language family
  (with Australian and New Zealand sign languages).

  - Grammar: Often follows a topic-comment structure.

  - Features: Heavily relies on body movement and hand shapes for nuance.'
