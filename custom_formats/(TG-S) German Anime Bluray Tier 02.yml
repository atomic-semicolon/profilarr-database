name: (TG-S) German Anime Bluray Tier 02
description: "- **Source:** Direct Bluray Remux/BDMV, no Re-Encodes.\n- **Video:**\
  \ Casual filtering (debanding, de-/regraining, anti-aliasing, dehaloing). Improvements\
  \ are visible, but the release typically does not (consistently) address heavier\
  \ BD issues like chroma shift, bad decimation/duplicate-frame patterns, or rescale\
  \ problems.\n- **Audio:** Lossless may be kept as-is or converted losslessly to\
  \ FLAC. Lossy audio is not re-encoded.\n- **QC & Features:**\n    - **Subtitles:**\
  \ OCR'd BD subs or Web-subs included, basic readability styling expected. Raw PGS\
  \ is acceptable. Fonts may or may not be attached.\n    - **Chapters:** Usually\
  \ present, can be basic.\n    - **Tags:** Mostly correct, occasional inconsistencies."
