name: (TG-R) German Anime Web Tier 03
description: "- **Source:** WEB-DLs or WEBRip from less reliable providers or inconsistent\
  \ releases from groups lacking commitment.\n- **Video:** Functional, but often lacks\
  \ consistency across different episodes/seasons. Encoding artifacts are only visible\
  \ upon close inspection.\n- **QC & Features:**\n    - **Subtitles:** SRT/ASS included.\n\
  \    - **Chapters:** Missing entirely.\n    - **Tags:** Messy or incomplete tags\
  \ and filenames."
