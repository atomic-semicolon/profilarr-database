name: (TG-R) HTSR
description: 'Disney+ Hotstar is an Indian subscription streaming service owned by
  JioStar. It was originally launched in 2015 as Hotstar, offering films, TV series,
  live sports, and original programming. Following Disney''s acquisition of 21st Century
  Fox in 2019, Hotstar was rebranded as Disney+ Hotstar in April 2020, adding content
  from Disney, Pixar, Marvel, Lucasfilm, and National Geographic. It also operates
  in Indonesia, Malaysia, and Thailand, combining local content with the Disney+ library.
  It is the second largest streaming platform in the world by subscribers, behind
  only Netflix.

  For more information, visit the [Disney+ Hotstar Wikipedia page](https://en.wikipedia.org/wiki/Disney%2B_Hotstar).'
