name: (TG-S) German Anime Bluray Tier 03
description: "- **Source:** Direct Bluray Remux/BDMV, no Re-Encodes.\n- **Video:**\
  \ No filtering/basic encode approach. Can be fine on clean discs, but commonly carries\
  \ over BD flaws (banding, chroma shift, bad/absent decimation with duplicates, rescale\
  \ issues). Encoding artifacts are typically only noticeable on closer inspection,\
  \ but underlying source issues remain.\n- **Audio:** Typically original tracks (often\
  \ bloated). Lossless-to-FLAC savings are usually not applied. Lossy audio remains\
  \ untouched.\n- **QC & Features:**\n    - **Subtitles:** Raw BD-PGS common, limited\
  \ typesetting, timing not optimized. Little/no OCR, little/no styling work.\n  \
  \  - **Chapters:** May be missing or pass-through only.\n    - **Tags:** Messy or\
  \ inconsistent naming/metadata more likely."
